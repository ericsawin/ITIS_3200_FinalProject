<!doctype html>
<html lang="en">
  <head>
    <title>Safe Login</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <form id="safeLoginForm">
      <h1 class="safe-title">Safe Login</h1>

      <label for="username">Username:</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        placeholder="Enter your username"
      />

      <label for="psw">Password:</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        minlength="8"
      />

      <button type="submit">Login</button>
    </form>

    <pre id="message"></pre>

    <p class="info">
      This login is protected using prepared statements.
      SQL injection attacks will not work here.
    </p>

    <p class="instructions">
      Try this attack:
      <br>
      Username: anything
      <br>
      Password: ' OR '1'='1
      <br>
      This should FAIL.
    </p>

    <p class="backtostart">
      <a href="index.html">Back to Start</a>
    </p>

    <script src="app.js"></script>
  </body>
</html>
